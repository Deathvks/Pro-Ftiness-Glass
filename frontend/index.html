  <meta name="theme-color" content="#1b2335" id="dynamic-theme-color" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />

  <link rel="icon" type="image/png" href="/favicon-32x32.png?v=2" />
  <link rel="apple-touch-icon" href="/apple-touch-icon.png?v=2" />
  <link rel="manifest" href="/manifest.json?v=2" />

  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-title" content="Pro Fitness" />

  <link rel="preconnect" href="https://accounts.google.com" crossorigin />
  <link rel="dns-prefetch" href="https://accounts.google.com" />

  <meta name="google-site-verification" content="ARC8lM_i6d5sVoiyNVFvw28qpbyy-Xr7xI5eZBHmaSo" />

  <style>
    :root {
      --accent-r: 34;
      --accent-g: 197;
      --accent-b: 94; 
      --glass-base: 26, 35, 53;
      --glass-opacity: 0.65;
      --glass-border-opacity: 0.2;
      --glass-blur: 24px;
      --glass-radius: 28px;
      --glass-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
      --bg-color: #0c111b;
    }

    html.light-theme {
      --glass-base: 255, 255, 255;
      --glass-opacity: 0.6;
      --glass-border-opacity: 0.5;
      --glass-shadow: 0 8px 32px rgba(0, 0, 0, 0.06);
      --bg-color: #f8fafc;
    }

    html.dark-theme {
      --glass-base: 30, 41, 59;
      --glass-opacity: 0.55;
      --glass-border-opacity: 0.2;
      --glass-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
      --bg-color: #0f172a;
    }

    html.oled-theme {
      --glass-base: 15, 15, 15;
      --glass-opacity: 0.7;
      --glass-border-opacity: 0.3;
      --glass-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
      --bg-color: #000000;
    }
    
    html.galaxy-theme {
      --glass-base: 8, 8, 20;
      --glass-opacity: 0.15;
      --glass-border-opacity: 0.2;
      --glass-blur: 2px;
      --glass-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
      --bg-color: #080814;
    }

    .app-splash-screen {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: space-between; 
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      z-index: 9999;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
      background-color: transparent; 
      color: #ffffff;
      opacity: 1;
      transition: opacity 0.3s ease;
      padding-top: 35vh; 
      padding-bottom: 20px;
      box-sizing: border-box;
    }

    .splash-content {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    .app-splash-spinner {
      width: 48px;
      height: 48px;
      border: 3px solid rgba(var(--accent-r), var(--accent-g), var(--accent-b), 0.1);
      border-radius: 50%;
      border-top-color: rgb(var(--accent-r), var(--accent-g), var(--accent-b));
      animation: spin 1s ease-in-out infinite;
      box-shadow: 0 0 20px -5px rgb(var(--accent-r), var(--accent-g), var(--accent-b));
      margin-top: 2rem;
    }

    html.light-theme .app-splash-screen {
      color: #0f172a;
    }

    html.light-theme .app-splash-spinner {
      border-color: rgba(0, 0, 0, 0.05);
      border-top-color: rgb(var(--accent-r), var(--accent-g), var(--accent-b));
    }

    .app-splash-title {
      font-size: 2.5rem;
      font-weight: 800;
      text-align: center;
      line-height: 1.2;
      letter-spacing: -0.02em;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.75rem;
      animation: fadeUp 0.8s ease-out forwards;
      opacity: 0;
    }

    .app-splash-title span.glass-badge {
      display: inline-block;
      font-size: 1.5rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      padding: 0.5rem 1.5rem;
      border-radius: var(--glass-radius);
      background-image: 
        linear-gradient(rgba(var(--accent-r), var(--accent-g), var(--accent-b), 0.10), rgba(var(--accent-r), var(--accent-g), var(--accent-b), 0.10)),
        linear-gradient(rgba(var(--glass-base), var(--glass-opacity)), rgba(var(--glass-base), var(--glass-opacity)));
      border: 1px solid rgba(var(--accent-r), var(--accent-g), var(--accent-b), var(--glass-border-opacity));
      border-top-color: rgba(255, 255, 255, 0.3);
      backdrop-filter: blur(var(--glass-blur));
      -webkit-backdrop-filter: blur(var(--glass-blur));
      box-shadow: var(--glass-shadow);
      color: rgb(var(--accent-r), var(--accent-g), var(--accent-b));
      text-transform: uppercase;
    }

    .app-splash-footer {
      width: 100%;
      text-align: center;
      font-size: 0.75rem;
      opacity: 0.7;
      pointer-events: auto;
    }

    .app-splash-footer nav {
      margin-bottom: 8px;
    }

    .app-splash-footer a {
      color: inherit;
      text-decoration: none;
      font-weight: 600;
      margin: 0 8px;
      border-bottom: 1px solid transparent;
      transition: border-color 0.2s;
    }

    .app-splash-footer a:hover {
      border-bottom-color: currentColor;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>

  <script>
    (function () {
      try {
        var accentMap = {
          'green': '#22c55e', 'blue': '#3b82f6', 'violet': '#8b5cf6', 'amber': '#f59e0b',
          'rose': '#f43f5e', 'teal': '#14b8a6', 'cyan': '#06b6d4', 'orange': '#f97316',
          'lime': '#84cc16', 'fuchsia': '#d946ef', 'emerald': '#10b981', 'indigo': '#6366f1',
          'purple': '#a855f7', 'pink': '#ec4899', 'red': '#ef4444', 'yellow': '#eab308',
          'sky': '#0ea5e9', 'slate': '#64748b', 'zinc': '#71717a', 'stone': '#78716c',
          'neutral': '#737373'
        };

        var savedTheme = localStorage.getItem('theme') || 'system';
        var savedAccentKey = localStorage.getItem('accent') || 'green';
        var systemDark = window.matchMedia('(prefers-color-scheme: dark)').matches;

        if (savedAccentKey.startsWith('"') && savedAccentKey.endsWith('"')) {
          savedAccentKey = savedAccentKey.slice(1, -1);
        }

        var hexColor = accentMap[savedAccentKey] || savedAccentKey;
        if (!/^#[0-9A-F]{6}$/i.test(hexColor)) hexColor = '#22c55e';

        function hexToRgb(hex) {
          var result = /^#?([a-f\d]{2})([a-f\d]{2})([a-f\d]{2})$/i.exec(hex);
          return result ? {
            r: parseInt(result[1], 16), g: parseInt(result[2], 16), b: parseInt(result[3], 16)
          } : { r: 34, g: 197, b: 94 };
        }

        var rgb = hexToRgb(hexColor);
        var root = document.documentElement;
        root.style.setProperty('--app-accent', hexColor);
        root.style.setProperty('--accent-r', rgb.r);
        root.style.setProperty('--accent-g', rgb.g);
        root.style.setProperty('--accent-b', rgb.b);

        var effectiveTheme = savedTheme;
        if (effectiveTheme === 'system') effectiveTheme = systemDark ? 'dark' : 'light';

        var bgColors = { light: '#f8fafc', dark: '#0f172a', oled: '#000000', galaxy: '#080814' };
        var headerColors = { light: '#f1f3f4', dark: '#1b2335', oled: '#0d0d0d', galaxy: '#080814' };

        var selectedBgColor = bgColors[effectiveTheme] || bgColors.dark;
        var selectedHeaderColor = headerColors[effectiveTheme] || headerColors.dark;

        root.classList.remove('light-theme', 'dark-theme', 'oled-theme', 'galaxy-theme');
        if (savedTheme === 'system') {
          root.classList.add(systemDark ? 'dark-theme' : 'light-theme');
        } else {
          root.classList.add(effectiveTheme + '-theme');
        }

        // Modificamos directamente nuestra etiqueta maestra
        var metaColor = document.getElementById('dynamic-theme-color');
        if(metaColor) {
            metaColor.setAttribute('content', selectedHeaderColor);
        }

        // Forzamos el color del HTML y BODY de manera estricta para Safari
        root.style.setProperty('background-color', selectedHeaderColor, 'important');
        var setBodyColor = function() {
            if(document.body) {
              document.body.style.setProperty('background-color', selectedHeaderColor, 'important');
            }
        };
        if(document.body) setBodyColor();
        else document.addEventListener('DOMContentLoaded', setBodyColor);

        // Truco del Splash Screen
        var splash = document.querySelector('.app-splash-screen');
        if(splash) {
           splash.style.background = 'linear-gradient(to bottom, ' + selectedHeaderColor + ' 0%, ' + selectedHeaderColor + ' env(safe-area-inset-top, 47px), ' + selectedBgColor + ' env(safe-area-inset-top, 47px), ' + selectedBgColor + ' 100%)';
        }

      } catch (e) {
        console.error('Splash init error', e);
      }
    })();
  </script>
</head>

<body>
  <div id="root">
    <div class="app-splash-screen">
      
      <div class="splash-content">
        <div class="app-splash-title">
          PRO FITNESS 
          <span class="glass-badge">GLASS</span>
        </div>
        <div class="app-splash-spinner"></div>
      </div>

      <footer class="app-splash-footer">
        <nav>
          <a href="https://pro-fitness-glass.zeabur.app/privacy">Política de Privacidad</a>
          <span style="opacity: 0.4; margin: 0 5px;">|</span>
          <a href="https://pro-fitness-glass.zeabur.app/terms">Términos del Servicio</a>
        </nav>
        <div style="margin-top: 8px; opacity: 0.5; font-size: 0.9em;">
           © 2026 Pro Fitness Glass
        </div>
      </footer>

    </div>
  </div>

  <script type="module" src="/src/main.jsx"></script>
</body>

</html>
